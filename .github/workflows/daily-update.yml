name: Daily NBA SIM Update

on:
  schedule:
    # ── POST-GAME: 11:30 PM PST = 7:30 AM UTC ──
    # Settle blog + load tomorrow's slate (BM fallback if RotoWire stale)
    - cron: '30 7 * * *'

    # ── MORNING UPDATE: 5:30 AM PST = 1:30 PM UTC ──
    # First daily stats refresh — RotoWire lineups + fresh odds + BR game data
    - cron: '30 13 * * *'

    # ── TRENDS REFRESH: 8:00 AM PST = 4:00 PM UTC ──
    # Collect missing boxscores (14-day window) + refresh lineup combos + regenerate HTML
    - cron: '0 16 * * *'

    # ── POST-GAME SETTLEMENT: 9:00 AM PST = 5:00 PM UTC ──
    # Grades yesterday's picks, updates bankroll + blog
    - cron: '0 17 * * *'

    # ── PRE-GAME UPDATE: 10:00 AM PST = 6:00 PM UTC ──
    # Second daily stats refresh — final confirmed lineups + fresh odds
    - cron: '0 18 * * *'

  workflow_dispatch:
    inputs:
      full_pipeline:
        description: 'Run full pipeline (collect + analyze + scores + predict)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      settle_only:
        description: 'Run settlement only (grade picks + update blog)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      trends_only:
        description: 'Run trends refresh only (collect boxscores + lineup stats)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      inject_pick:
        description: 'Manual pick injection — e.g. "BOS @ CLE" "BOS -0.5" --risk 50'
        required: false
        default: ''
        type: string

permissions:
  contents: write

# Prevent overlapping runs from racing on git push
concurrency:
  group: nba-sim-pipeline
  cancel-in-progress: false

jobs:
  # ════════════════════════════════════════════
  # PRE-GAME JOBS (evening cron + manual)
  # ════════════════════════════════════════════

  update-lines:
    # Skip on morning settlement cron (5 PM UTC = 9 AM PST), trends cron, or manual trends/settle
    if: github.event.schedule != '0 17 * * *' && github.event.schedule != '0 16 * * *' && inputs.settle_only != 'true' && inputs.trends_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout nbasim
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: echo "ODDS_API_KEY=${{ secrets.ODDS_API_KEY }}" > .env

      # ── Refresh rosters + player stats (non-blocking — cached DB is fine if API is down) ──
      - name: Refresh rosters and player stats
        continue-on-error: true
        timeout-minutes: 5
        run: |
          python -c "
          import sys, os, logging
          sys.path.insert(0, os.getcwd())
          logging.basicConfig(level=logging.INFO, format='%(asctime)s [%(levelname)s] %(message)s')
          from config import DB_PATH
          from collectors.players import PlayerCollector
          pc = PlayerCollector(DB_PATH)
          pc.collect_teams()
          try:
              pc.collect_rosters('2025-26')
          except Exception as e:
              print(f'Roster refresh failed (using cached): {e}')
          try:
              pc.collect_player_season_stats('2025-26')
          except Exception as e:
              print(f'Player stats refresh failed (using cached): {e}')
          try:
              pc.collect_team_season_stats('2025-26')
          except Exception as e:
              print(f'Team stats refresh failed (using cached): {e}')
          print('=== Rosters + season stats step complete ===')
          "

      # ── Optional: full pipeline (manual trigger only) ──
      - name: Run full pipeline
        if: inputs.full_pipeline == 'true'
        timeout-minutes: 20
        run: |
          echo "=== Full pipeline: collect (skip-boxscores) → analyze → scores → predict ==="
          python main.py collect --skip-boxscores 2>&1 | tail -30
          python main.py analyze 2>&1 | tail -10
          python main.py scores 2>&1 | tail -10
          python main.py predict 2>&1 | tail -10
          echo "=== Full pipeline complete ==="

      # ── Always: pull fresh odds + generate HTML (with retry) ──
      - name: Generate dashboard (fresh odds + props)
        run: |
          success=false
          for attempt in 1 2 3; do
            echo "=== Attempt $attempt/3 ==="
            if python generate_frontend.py; then
              success=true
              break
            fi
            echo "Attempt $attempt failed, waiting 60s before retry..."
            sleep 60
          done
          if [ "$success" = false ]; then
            echo "::error::All 3 generate_frontend.py attempts failed"
            exit 1
          fi

      # ── Daily intelligence snapshot (MOJO trajectories + potential model) ──
      - name: Intelligence snapshot
        continue-on-error: true
        run: python scripts/snapshot_daily.py

      # ── Capture picks on every run (dedup prevents double-counting) ──
      - name: Capture picks
        run: python scripts/capture_picks.py

      # ── Manual pick injection (workflow_dispatch only) ──
      - name: Inject manual pick
        if: inputs.inject_pick != ''
        run: python scripts/inject_pick.py ${{ inputs.inject_pick }}

      # ── Generate blog entry AFTER manual picks so all picks get cards ──
      - name: Generate blog entry
        run: python scripts/generate_blog_entry.py

      # ── Commit + push ──
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          DATE=$(TZ='America/Los_Angeles' date '+%b %d %I:%M %p PST')

          git add index.html nba_sim.html data/daily_picks.json

          # Include pick data if capture ran
          if [ -f data/picks.csv ]; then git add data/picks.csv; fi
          if [ -f data/pick_log.json ]; then git add data/pick_log.json; fi
          if [ -f data/blog_snippet.html ]; then git add data/blog_snippet.html; fi

          # Always include DB + refresh marker
          git add db/nba_sim.db
          if [ -f db/.nba_api_last_refresh ]; then git add db/.nba_api_last_refresh; fi

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto-update lines — ${DATE}"
          git pull --rebase origin main || true
          git push

  # ── Sync to MORELLOSIMS (blog + nbasim dashboard) ──
  sync-to-morellosims:
    needs: update-lines
    if: github.event.schedule != '0 17 * * *' && github.event.schedule != '0 16 * * *' && inputs.settle_only != 'true' && inputs.trends_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout MORELLOSIMS
        uses: actions/checkout@v4
        with:
          repository: jack-more/MORELLOSIMS
          token: ${{ secrets.MORELLOSIMS_PAT }}
          path: morellosims

      - name: Checkout nbasim (fresh HTML)
        uses: actions/checkout@v4
        with:
          path: nbasim

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install beautifulsoup4

      - name: Sync pick data to blog
        run: python nbasim/scripts/update_blog.py nbasim/index.html morellosims/index.html

      - name: Inject blog entry (if new snippet exists)
        run: |
          if [ -f nbasim/data/blog_snippet.html ]; then
            python nbasim/scripts/inject_blog_entry.py nbasim/data/blog_snippet.html morellosims/index.html
          else
            echo "No blog_snippet.html found — skipping injection"
          fi

      - name: Copy NBA SIM dashboard + inject auth
        run: |
          cp nbasim/index.html morellosims/nbasim/index.html
          FILE=morellosims/nbasim/index.html

          # Auth CSS + Firebase SDK already included by generate_frontend.py
          # Only inject MORELLOSIMS-specific additions:

          # Add dark theme attribute to body
          sed -i 's|<body>|<body data-ma-theme="dark">|' "$FILE"

          # Add status-indicators div for profile button
          sed -i 's|<div class="top-picks">|<div class="top-picks" style="display:flex;align-items:center;gap:8px;">\n                <div class="status-indicators" style="display:flex;align-items:center;"></div>|' "$FILE"

      - name: Commit and push
        working-directory: morellosims
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          DATE=$(TZ='America/Los_Angeles' date '+%b %d %I:%M %p PST')

          git add index.html nbasim/index.html

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Auto-sync lines from NBA SIM — ${DATE}"
          git pull --rebase origin main || true
          git push

  # ════════════════════════════════════════════
  # DAILY TRENDS REFRESH (8 AM PST cron)
  # ════════════════════════════════════════════

  refresh-trends:
    # Run on the 8 AM PST trends cron (4 PM UTC) or manual trends_only trigger
    if: github.event.schedule == '0 16 * * *' || inputs.trends_only == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout nbasim
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: echo "ODDS_API_KEY=${{ secrets.ODDS_API_KEY }}" > .env

      - name: Refresh trends (collect missing boxscores + lineup stats)
        timeout-minutes: 15
        run: python scripts/refresh_trends.py

      - name: Regenerate dashboard with fresh trends
        run: |
          success=false
          for attempt in 1 2 3; do
            echo "=== Generate attempt $attempt/3 ==="
            if python generate_frontend.py; then
              success=true
              break
            fi
            echo "Attempt $attempt failed, waiting 30s before retry..."
            sleep 30
          done
          if [ "$success" = false ]; then
            echo "::error::All 3 generate_frontend.py attempts failed"
            exit 1
          fi

      - name: Intelligence snapshot
        continue-on-error: true
        run: python scripts/snapshot_daily.py

      - name: Capture picks
        continue-on-error: true
        run: python scripts/capture_picks.py

      - name: Generate blog entry
        continue-on-error: true
        run: python scripts/generate_blog_entry.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          DATE=$(TZ='America/Los_Angeles' date '+%b %d %I:%M %p PST')

          git add index.html nba_sim.html db/nba_sim.db
          if [ -f db/.nba_api_last_refresh ]; then git add db/.nba_api_last_refresh; fi
          if [ -f data/picks.csv ]; then git add data/picks.csv; fi
          if [ -f data/pick_log.json ]; then git add data/pick_log.json; fi
          if [ -f data/blog_snippet.html ]; then git add data/blog_snippet.html; fi
          if [ -f data/daily_picks.json ]; then git add data/daily_picks.json; fi

          if git diff --cached --quiet; then
            echo "No trend changes to commit"
            exit 0
          fi

          git commit -m "Daily trends refresh — ${DATE}"
          git pull --rebase origin main || true
          git push

  # Sync trends update to MORELLOSIMS
  sync-trends-to-morellosims:
    needs: refresh-trends
    if: always() && (github.event.schedule == '0 16 * * *' || inputs.trends_only == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout MORELLOSIMS
        uses: actions/checkout@v4
        with:
          repository: jack-more/MORELLOSIMS
          token: ${{ secrets.MORELLOSIMS_PAT }}
          path: morellosims

      - name: Checkout nbasim (fresh HTML)
        uses: actions/checkout@v4
        with:
          path: nbasim

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install beautifulsoup4

      - name: Sync pick data to blog
        run: python nbasim/scripts/update_blog.py nbasim/index.html morellosims/index.html

      - name: Inject blog entry (if new snippet exists)
        run: |
          if [ -f nbasim/data/blog_snippet.html ]; then
            python nbasim/scripts/inject_blog_entry.py nbasim/data/blog_snippet.html morellosims/index.html
          else
            echo "No blog_snippet.html found — skipping injection"
          fi

      - name: Copy NBA SIM dashboard + inject auth
        run: |
          cp nbasim/index.html morellosims/nbasim/index.html
          FILE=morellosims/nbasim/index.html

          # Auth CSS + Firebase SDK already included by generate_frontend.py
          sed -i 's|<body>|<body data-ma-theme="dark">|' "$FILE"
          sed -i 's|<div class="top-picks">|<div class="top-picks" style="display:flex;align-items:center;gap:8px;">\n                <div class="status-indicators" style="display:flex;align-items:center;"></div>|' "$FILE"

      - name: Commit and push
        working-directory: morellosims
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          DATE=$(TZ='America/Los_Angeles' date '+%b %d %I:%M %p PST')

          git add index.html nbasim/index.html

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Daily trends refresh sync — ${DATE}"
          git pull --rebase origin main || true
          git push

  # ════════════════════════════════════════════
  # POST-GAME SETTLEMENT JOBS (morning cron + manual)
  # ════════════════════════════════════════════

  grade-picks:
    # Run on morning settlement cron or manual settle_only trigger
    if: github.event.schedule == '0 17 * * *' || inputs.settle_only == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout nbasim
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Grade picks
        run: python scripts/grade_picks.py

      - name: Commit settlement results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          DATE=$(TZ='America/Los_Angeles' date '+%b %d %I:%M %p PST')

          git add data/picks.csv data/settlement_results.json

          if git diff --cached --quiet; then
            echo "No settlement changes"
            exit 0
          fi

          git commit -m "Grade picks — ${DATE}"
          git pull --rebase origin main || true
          git push

  settle-morellosims:
    needs: grade-picks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout MORELLOSIMS
        uses: actions/checkout@v4
        with:
          repository: jack-more/MORELLOSIMS
          token: ${{ secrets.MORELLOSIMS_PAT }}
          path: morellosims

      - name: Checkout nbasim (with settlement results)
        uses: actions/checkout@v4
        with:
          path: nbasim

      - name: Pull latest nbasim (grade-picks may have pushed new data)
        working-directory: nbasim
        run: git pull origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install python-dotenv

      - name: Settle blog with results
        run: python nbasim/scripts/settle_blog.py nbasim/data/settlement_results.json morellosims/index.html

      - name: Copy NBA SIM dashboard + inject auth
        run: |
          cp nbasim/index.html morellosims/nbasim/index.html
          FILE=morellosims/nbasim/index.html

          # Auth CSS + Firebase SDK already included by generate_frontend.py
          sed -i 's|<body>|<body data-ma-theme="dark">|' "$FILE"
          sed -i 's|<div class="top-picks">|<div class="top-picks" style="display:flex;align-items:center;gap:8px;">\n                <div class="status-indicators" style="display:flex;align-items:center;"></div>|' "$FILE"

      - name: Commit and push
        working-directory: morellosims
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          DATE=$(TZ='America/Los_Angeles' date '+%b %d %I:%M %p PST')

          git add index.html nbasim/index.html

          if git diff --cached --quiet; then
            echo "No settlement blog changes"
            exit 0
          fi

          git commit -m "Settle picks — ${DATE}"
          git pull --rebase origin main || true
          git push
